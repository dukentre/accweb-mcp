services:
  accweb:
    image: ${ACCWEB_IMAGE:-accweb/accweb:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${ACCWEB_VERSION:-docker}
        COMMIT: ${ACCWEB_COMMIT:-local}
    container_name: ${ACCWEB_CONTAINER_NAME:-accweb-server}
    restart: unless-stopped
    ports:
      - "${ACCWEB_HTTP_PORT:-8080}:8080"
      - "${ACC_LAN_PORT:-8999}:8999/udp"
      - "${ACC_UDP_PORT:-9231}:9231/udp"
      - "${ACC_TCP_PORT:-9232}:9232/tcp"
    volumes:
      - accweb-config:/accweb/config
      - accweb-secrets:/accweb/secrets
      - acccerts:/sslcerts
      - type: bind
        source: ${ACCSERVER_HOST_PATH:-./accserver}
        target: /accserver
        read_only: true
    environment:
      ACCWEB_HOST: 0.0.0.0:8080
      ACCWEB_TIMEOUT: ${ACCWEB_TIMEOUT:-24h}
      ACCWEB_ENABLE_TLS: "false"
      ACCWEB_CERT_FILE: /sslcerts/certificate.crt
      ACCWEB_PRIV_FILE: /sslcerts/private.key
      ACCWEB_ADMIN_PASSWORD: ${ACCWEB_ADMIN_PASSWORD:-change-me-admin}
      ACCWEB_MOD_PASSWORD: ${ACCWEB_MOD_PASSWORD:-change-me-mod}
      ACCWEB_RO_PASSWORD: ${ACCWEB_RO_PASSWORD:-change-me-readonly}
      ACCWEB_ACC_SERVER_PATH: ${ACCWEB_ACC_SERVER_PATH:-/accserver/server}
      ACCWEB_ACC_SERVER_EXE: ${ACCWEB_ACC_SERVER_EXE:-accServer.exe}
      ACCWEB_LOGLEVEL: ${ACCWEB_LOGLEVEL:-info}
      ACCWEB_CORS: "${ACCWEB_CORS:-*}"
      ACCWEB_LOG_WITH_TIMESTAMP: ${ACCWEB_LOG_WITH_TIMESTAMP:-true}
      ACCWEB_MCP_ENABLED: ${ACCWEB_MCP_ENABLED:-true}
      ACCWEB_MCP_TOKEN: ${ACCWEB_MCP_TOKEN:-change-me-mcp-token}
      ACCWEB_MCP_ALLOWED_ORIGINS: ${ACCWEB_MCP_ALLOWED_ORIGINS:-}
      ACCWEB_CALLBACK_ENABLED: ${ACCWEB_CALLBACK_ENABLED:-false}
      ACCWEB_CALLBACK_TIMEOUT: ${ACCWEB_CALLBACK_TIMEOUT:-500ms}
      ACCWEB_CALLBACK_URL: ${ACCWEB_CALLBACK_URL:-}
      ACCWEB_CALLBACK_HEADER_KEY: ${ACCWEB_CALLBACK_HEADER_KEY:-}
      ACCWEB_CALLBACK_HEADER_VALUE: ${ACCWEB_CALLBACK_HEADER_VALUE:-}
      ACCWEB_CALLBACK_EVENTS: ${ACCWEB_CALLBACK_EVENTS:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    
volumes:
  accweb-config:
  accweb-secrets:
  acccerts:
