# accweb server and application configuration.
# https://github.com/assetto-corsa-web/accweb

webserver:
  host: $ACCWEB_HOST
  tls: $ACCWEB_ENABLE_TLS
  cert: $ACCWEB_CERT_FILE
  private_key: $ACCWEB_PRIV_FILE
  
  write_timeout: 5
  read_timeout: 5
  
auth:
  timeout: $ACCWEB_TIMEOUT
  admin_password: $ACCWEB_ADMIN_PASSWORD
  moderator_password: $ACCWEB_MOD_PASSWORD
  read_only_password: $ACCWEB_RO_PASSWORD

acc:
  server_path: "$ACCWEB_ACC_SERVER_PATH"
  server_exe: "$ACCWEB_ACC_SERVER_EXE"
  
config_path: config/
dev: false
loglevel: $ACCWEB_LOGLEVEL
cors:
  origins: "$ACCWEB_CORS"
  loglevel: $ACCWEB_LOGLEVEL

log:
  with_timestamp: $ACCWEB_LOG_WITH_TIMESTAMP

mcp:
  enabled: $ACCWEB_MCP_ENABLED
  token: "$ACCWEB_MCP_TOKEN"
  allowed_origins: "$ACCWEB_MCP_ALLOWED_ORIGINS"

callback:
  enabled: $ACCWEB_CALLBACK_ENABLED
  timeout: $ACCWEB_CALLBACK_TIMEOUT
  clients:
    - url: "$ACCWEB_CALLBACK_URL"
      headers:
        "$ACCWEB_CALLBACK_HEADER_KEY": "$ACCWEB_CALLBACK_HEADER_VALUE"
      events: [ $ACCWEB_CALLBACK_EVENTS ]
